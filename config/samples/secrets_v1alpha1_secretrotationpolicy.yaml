apiVersion: secrets.keysmith.io/v1alpha1
kind: SecretRotationPolicy
metadata:
  name: demo-rotation
  namespace: default
  labels:
    app.kubernetes.io/name: keysmith
    app.kubernetes.io/managed-by: kustomize
spec:
  secretRef:
    name: demo-secret

  # Rotate every 5 minutes (for demo purposes — use a longer schedule in production)
  schedule: "*/5 * * * *"

  provider:
    name: mock
    params:
      prefix: demo

  keys:
    - providerKey: password
      secretKey: DB_PASSWORD
    - providerKey: username
      secretKey: DB_USER
    - providerKey: apiKey
      secretKey: API_KEY

  policy:
    historyLimit: 5
    failurePolicy: Fail
    retryLimit: 3
    retryBackoff: 30s
    suspend: false

  # Uncomment to trigger rolling restarts of dependent workloads after rotation:
  # restartTargets:
  #   - kind: Deployment
  #     name: my-app
  #     namespace: default

  # Uncomment to receive webhook notifications on rotation events:
  # notifications:
  #   - events:
  #       - RotationSucceeded
  #       - RotationFailed
  #     secretRef:
  #       name: slack-webhook-secret
  #       key: url
