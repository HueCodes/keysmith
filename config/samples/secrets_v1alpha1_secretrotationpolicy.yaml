apiVersion: secrets.keysmith.io/v1alpha1
kind: SecretRotationPolicy
metadata:
  name: demo-rotation
  namespace: default
  labels:
    app.kubernetes.io/name: keysmith
    app.kubernetes.io/managed-by: kustomize
spec:
  # Target Kubernetes Secret — keysmith will create or update this.
  secretRef:
    name: demo-secret

  # Rotate every 5 minutes (great for demos; use a longer interval in production).
  schedule: "*/5 * * * *"

  # Use the built-in static provider — no AWS/Vault credentials needed.
  # Generates a fresh cryptographically random password on every rotation.
  provider:
    name: static
    params:
      length: "32"

  # Map provider-side keys to Kubernetes secret data keys.
  keys:
    - providerKey: password
      secretKey: DB_PASSWORD

  policy:
    historyLimit: 5    # keep only the 5 most recent RotationRecords
    failurePolicy: Fail
    retryLimit: 3
    retryBackoff: 30s

  # Uncomment to trigger rolling restarts of dependent workloads after rotation:
  # restartTargets:
  #   - kind: Deployment
  #     name: my-app
  #     namespace: default

  # Uncomment to receive webhook notifications on rotation events:
  # notifications:
  #   - url: https://hooks.slack.com/services/XXX/YYY/ZZZ
  #     events: [RotationSucceeded, RotationFailed]
  #   - secretRef:              # read URL from a K8s Secret key
  #       name: slack-webhook-secret
  #       key: url
  #     events: [RotationFailed]
