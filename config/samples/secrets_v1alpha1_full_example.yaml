# Full example showing every available field in SecretRotationPolicy.
# This is a reference document — not all fields are required.
# See config/samples/secrets_v1alpha1_secretrotationpolicy.yaml for a minimal working example.

apiVersion: secrets.keysmith.io/v1alpha1
kind: SecretRotationPolicy
metadata:
  name: full-example
  namespace: production
  # Trigger an immediate rotation by adding this annotation:
  # annotations:
  #   secrets.keysmith.io/rotate: "now"
spec:

  # ── Target secret ────────────────────────────────────────────────────────────

  # secretRef identifies the Kubernetes Secret to create or update.
  # The secret will be labelled with secrets.keysmith.io/managed-by=keysmith.
  secretRef:
    name: myapp-db-credentials
    namespace: production    # optional; defaults to the policy's namespace

  # ── Schedule ─────────────────────────────────────────────────────────────────

  # Standard 5-field cron expression (minute hour day-of-month month day-of-week).
  # Shorthands: @hourly, @daily, @weekly, @monthly, @yearly are also accepted.
  schedule: "0 2 * * *"      # every day at 02:00

  # rotationWindow triggers rotation early if within this duration of the scheduled time.
  # Example: with schedule="0 2 * * *" and rotationWindow=10m, rotation fires at 01:50.
  rotationWindow: 10m

  # ── Provider ─────────────────────────────────────────────────────────────────

  provider:
    # name selects the backend: mock | static | aws | vault
    name: aws

    # configRef optionally points to a ConfigMap or Secret with provider configuration.
    # configRef:
    #   name: aws-provider-config

    # params contains non-sensitive, provider-specific configuration.
    params:
      secretId: prod/myapp/db-credentials   # AWS: secret ARN or name
      region: us-east-1                     # AWS: region (or set AWS_DEFAULT_REGION env)
      # path: secret/data/myapp            # Vault: KV v2 path
      # address: https://vault.example.com # Vault: server address
      # length: "32"                       # static: password length 8-256

  # ── Key mappings ─────────────────────────────────────────────────────────────

  # Map provider-side keys to Kubernetes secret data keys.
  # Every providerKey must exist in the secret returned by the provider.
  keys:
    - providerKey: username
      secretKey: DB_USER
    - providerKey: password
      secretKey: DB_PASSWORD

  # ── Workload restarts ─────────────────────────────────────────────────────────

  # After a successful rotation, keysmith patches the pod template annotation
  # `secrets.keysmith.io/restartedAt` to trigger a rolling restart.
  restartTargets:
    - kind: Deployment       # Deployment | StatefulSet | DaemonSet
      name: myapp-api
      namespace: production  # optional; defaults to policy namespace
    - kind: Deployment
      name: myapp-worker

  # ── Policy ───────────────────────────────────────────────────────────────────

  policy:
    # historyLimit is the maximum number of RotationRecords to retain.
    # Oldest records are deleted when the limit is exceeded. Default: 10.
    historyLimit: 20

    # suspend pauses all scheduled rotations without deleting the policy.
    # Manual rotations (via annotation) are also blocked while suspended.
    suspend: false

    # failurePolicy controls the policy phase after a provider error.
    # Fail:   phase becomes Failed; operator alerts via conditions.
    # Ignore: phase stays Ready; error is logged but not surfaced.
    failurePolicy: Fail

    # retryLimit is the maximum number of retry attempts on transient failure.
    retryLimit: 3

    # retryBackoff is the wait duration between retry attempts.
    retryBackoff: 1m

  # ── Notifications ─────────────────────────────────────────────────────────────

  # HTTP webhooks fired asynchronously after each rotation event.
  # Payload: {"event":"RotationSucceeded","policy":"full-example","namespace":"production",
  #           "timestamp":"2026-01-15T02:00:01Z","record":"full-example-x9k2f"}
  notifications:
    # Direct URL (plaintext — use secretRef in production for sensitive URLs):
    - url: https://hooks.slack.com/services/XXX/YYY/ZZZ
      events:
        - RotationSucceeded
        - RotationFailed

    # Read the URL from a K8s Secret:
    - secretRef:
        name: pagerduty-webhook-secret
        key: url
      events:
        - RotationFailed
