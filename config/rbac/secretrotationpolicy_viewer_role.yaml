# This rule is not used by the project keysmith itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to secrets.keysmith.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: keysmith
    app.kubernetes.io/managed-by: kustomize
  name: secretrotationpolicy-viewer-role
rules:
- apiGroups:
  - secrets.keysmith.io
  resources:
  - secretrotationpolicies
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - secrets.keysmith.io
  resources:
  - secretrotationpolicies/status
  verbs:
  - get
