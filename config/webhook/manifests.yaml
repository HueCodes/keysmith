---
apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /mutate-secrets-keysmith-io-v1alpha1-secretrotationpolicy
  failurePolicy: Fail
  name: msecretrotationpolicy.kb.io
  rules:
  - apiGroups:
    - secrets.keysmith.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - secretrotationpolicies
  sideEffects: None
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
webhooks:
- admissionReviewVersions:
  - v1
  clientConfig:
    service:
      name: webhook-service
      namespace: system
      path: /validate-secrets-keysmith-io-v1alpha1-secretrotationpolicy
  failurePolicy: Fail
  name: vsecretrotationpolicy.kb.io
  rules:
  - apiGroups:
    - secrets.keysmith.io
    apiVersions:
    - v1alpha1
    operations:
    - CREATE
    - UPDATE
    resources:
    - secretrotationpolicies
  sideEffects: None
