---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: rotationrecords.secrets.keysmith.io
spec:
  group: secrets.keysmith.io
  names:
    categories:
    - keysmith
    kind: RotationRecord
    listKind: RotationRecordList
    plural: rotationrecords
    shortNames:
    - rr
    singular: rotationrecord
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.policyRef.name
      name: Policy
      type: string
    - jsonPath: .spec.triggeredBy
      name: Trigger
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .status.providerName
      name: Provider
      type: string
    - jsonPath: .status.duration
      name: Duration
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          RotationRecord is an immutable audit log entry for a single rotation attempt.
          Records are created by the SecretRotationPolicy controller and cleaned up
          according to spec.policy.historyLimit.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: RotationRecordSpec defines the immutable intent of a rotation
              attempt.
            properties:
              policyRef:
                description: PolicyRef references the SecretRotationPolicy that owns
                  this record.
                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              requestedAt:
                description: RequestedAt is the timestamp when the rotation was requested.
                format: date-time
                type: string
              triggeredBy:
                description: TriggeredBy identifies what initiated this rotation.
                enum:
                - Schedule
                - Manual
                type: string
            required:
            - policyRef
            - requestedAt
            - triggeredBy
            type: object
          status:
            description: RotationRecordStatus records the outcome of a rotation attempt.
            properties:
              completionTime:
                description: CompletionTime is when the rotation execution finished.
                format: date-time
                type: string
              duration:
                description: Duration is the human-readable duration of the rotation.
                type: string
              error:
                description: Error contains the error message if the rotation failed.
                type: string
              phase:
                description: Phase is the current state of this rotation record.
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              providerName:
                description: ProviderName is the provider used for this rotation.
                type: string
              restartsTriggered:
                description: RestartsTriggered lists the workloads that were rolling-restarted.
                items:
                  description: RestartTarget identifies a workload to rolling-restart
                    after rotation.
                  properties:
                    kind:
                      description: 'Kind is one of: Deployment, StatefulSet, DaemonSet.'
                      enum:
                      - Deployment
                      - StatefulSet
                      - DaemonSet
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
              retryCount:
                description: RetryCount is the number of retry attempts made for this
                  rotation.
                format: int32
                type: integer
              rotatedKeys:
                description: RotatedKeys lists the Kubernetes secret keys that were
                  updated.
                items:
                  type: string
                type: array
              startTime:
                description: StartTime is when the rotation execution began.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
